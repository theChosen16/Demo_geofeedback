name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt

      - name: Validate syntax
        run: |
          python -m compileall api scripts tests

      - name: Run observability regression tests
        run: |
          python -m unittest discover -s tests -p "test_public_stats_and_routes.py" -v

      - name: Validate monitor CLI
        run: |
          python scripts/monitor_deploy.py --help

      - name: Run tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v

      - name: Run production observability smoke check
        if: github.event_name == 'push' && (github.ref_name == 'master' || github.ref_name == 'main')
        run: |
          python scripts/monitor_deploy.py --url "https://geofeedback.cl" --once --retries 6 --retry-delay 10
