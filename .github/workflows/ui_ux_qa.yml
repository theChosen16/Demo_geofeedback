name: Suite de Control de Calidad UI/UX (Visual, Accesibilidad & Lighthouse)

on:
  push:
    branches: [master, main]
    paths:
      - 'frontend/**'
      - 'scripts/qa/**'
      - '.github/workflows/ui_ux_qa.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'frontend/**'
      - 'scripts/qa/**'
      - '.github/workflows/ui_ux_qa.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  ui_ux_agent_and_sentinel:
    name: Auditoría Semántica y Heurística de UI/UX
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar Agente de Auditoría Heurística UI/UX
        run: |
          python scripts/qa/ui_ux_design_review_agent.py

      - name: Ejecutar UISentinel Check
        run: |
          node scripts/qa/uisentinel_check.js

      - name: Ejecutar Agente Observador de IA con Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL_NAME: 'gemini-3.5-flash-lite'
        run: |
          python scripts/qa/gemini_qa_observer.py

      - name: Ejecutar Puente CI/CD Agéntico de Railway
        run: |
          python scripts/qa/railway_agentic_ci.py --check-status --run-tests

      - name: Guardar Reportes de UI/UX como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ui-ux-reports
          path: .agents/ui_reports/

  visual_regression_and_a11y:
    name: Regresión Visual Determinista & Accesibilidad (Playwright Container)
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.56.0-noble
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias del frontend
        run: |
          cd frontend
          npm ci || npm install

      - name: Instalar navegadores de Playwright
        run: |
          cd frontend
          npx playwright install chromium --with-deps

      - name: Compilar y ejecutar pruebas E2E (Visual + A11y)
        run: |
          cd frontend
          npx playwright test --update-snapshots

      - name: Guardar Reporte Playwright si existen fallos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

  lighthouse_ci:
    name: Presupuestos de Rendimiento Web (Lighthouse CI)
    runs-on: ubuntu-latest
    needs: visual_regression_and_a11y
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias y compilar frontend
        run: |
          cd frontend
          npm ci || npm install
          npm run build

      - name: Audit de Rendimiento con Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: './.lighthouserc.json'
          temporaryPublicStorage: true
